<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jaan AI Stable</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>

html,body{
height:100%;
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* breathing */

.breath{
animation:breath 4s infinite ease-in-out;
}

@keyframes breath{
0%,100%{transform:scale(1)}
50%{transform:scale(1.03)}
}

/* mouth */

.talking{
animation:talk .25s infinite;
}

@keyframes talk{
0%{transform:scaleY(1)}
50%{transform:scaleY(.5)}
100%{transform:scaleY(1)}
}

.chatBox{
position:absolute;
bottom:120px;
width:90%;
max-height:240px;
overflow-y:auto;
color:white;
font-size:14px;
}

.userMsg{
text-align:right;
color:#ffb3c6;
margin:6px;
}

.aiMsg{
text-align:left;
color:#ffd6e0;
margin:6px;
}

.typing{
opacity:.6;
font-style:italic;
}

</style>

</head>

<body class="flex justify-center items-center">

<!-- MENU -->

<div class="absolute top-4 left-4">

<button id="menuBtn"
class="text-white text-2xl">

<i class="fa fa-bars"></i>

</button>

<div id="menu"
class="hidden bg-black/80 p-4 rounded w-72">

<input id="apiKey"
type="password"
placeholder="Enter API Key"
class="w-full p-2 rounded bg-gray-800 text-white">

<button id="saveKey"
class="mt-2 w-full bg-pink-500 p-2 rounded">

Save API Key

</button>

</div>

</div>

<!-- CHARACTER -->

<div class="breath">

<div id="lottieGirl"
class="w-[300px] h-[420px]">
</div>

<div id="mouth"
class="w-14 h-6 bg-pink-500 rounded-full mt-[-80px] mx-auto">
</div>

</div>

<!-- CHAT -->

<div id="chatBox"
class="chatBox"></div>

<!-- MIC -->

<button id="micBtn"
class="absolute bottom-10 w-20 h-20 bg-pink-500 rounded-full text-white text-3xl">

<i class="fa fa-microphone"></i>

</button>

<script>

/* LOAD GIRL */

lottie.loadAnimation({

container:
document.getElementById("lottieGirl"),

renderer:"svg",

loop:true,

autoplay:true,

path:
"https://assets10.lottiefiles.com/packages/lf20_zrqthn6o.json"

});

/* MENU */

menuBtn.onclick=()=>{
menu.classList.toggle("hidden");
};

saveKey.onclick=()=>{

localStorage.setItem(
"geminiKey",
apiKey.value
);

alert("API Saved");

};

/* MEMORY */

let chatHistory=[
{
role:"user",
parts:[{
text:
"You are a romantic Indian girl named Jaan. Speak Hinglish. Be caring."
}]
}
];

/* CHAT */

function addMessage(text,type){

const box=document.getElementById("chatBox");

const div=document.createElement("div");

div.className=
type==="user"
? "userMsg"
: "aiMsg";

div.innerText=text;

box.appendChild(div);

box.scrollTop=box.scrollHeight;

}

/* SPEAK */

const mouth=document.getElementById("mouth");

function speak(text){

speechSynthesis.cancel();

mouth.classList.add("talking");

let utter=
new SpeechSynthesisUtterance(text);

utter.pitch=1.18;

utter.onend=()=>{

mouth.classList.remove("talking");

startListening();

};

speechSynthesis.speak(utter);

}

/* GEMINI */

async function askAI(prompt){

addMessage(prompt,"user");

chatHistory.push({
role:"user",
parts:[{text:prompt}]
});

const typing=document.createElement("div");

typing.className="aiMsg typing";

typing.innerText="Jaan typing...";

chatBox.appendChild(typing);

const key=
localStorage.getItem("geminiKey");

try{

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
contents:chatHistory
})

}
);

typing.remove();

/* ERROR */

if(!response.ok){

let txt=
await response.text();

alert(txt);

return;

}

const data=
await response.json();

let reply=
data?.candidates?.[0]?.content?.parts?.[0]?.text;

if(!reply){

addMessage("Empty reply","ai");

return;

}

chatHistory.push({
role:"model",
parts:[{text:reply}]
});

addMessage(reply,"ai");

speak(reply);

}
catch(e){

typing.remove();

alert("Network error");

}

}

/* VOICE */

let recognition;

function startListening(){

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition;

recognition=
new SpeechRecognition();

recognition.lang="hi-IN";

recognition.continuous=false;

recognition.interimResults=false;

recognition.onresult=(e)=>{

let text=
e.results[0][0].transcript;

speechSynthesis.cancel();

askAI(text);

};

recognition.onend=()=>{

recognition.start();

};

recognition.start();

}

micBtn.onclick=()=>{

startListening();

};

</script>

</body>
</html>
