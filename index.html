<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Jaan - Natural</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --pink: #ff85a2; --soft: #fff5f7; }
        body { background-color: var(--soft); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- Custom CSS Girl Character --- */
        .character-box { position: relative; width: 200px; height: 260px; perspective: 1000px; }
        .head { 
            width: 120px; height: 150px; background: #f3d5b5; border-radius: 60px 60px 50px 50px; 
            position: relative; border: 2px solid #e0b084; z-index: 10;
            animation: sway 4s ease-in-out infinite;
        }
        .hair { 
            position: absolute; top: -10px; left: -10px; width: 140px; height: 180px; 
            background: #2c1e1a; border-radius: 70px 70px 30px 30px; z-index: 5; 
        }
        .eye { width: 12px; height: 8px; background: #333; border-radius: 50%; position: absolute; top: 70px; animation: blink 4s infinite; }
        .eye.left { left: 25px; } .eye.right { right: 25px; }
        .mouth { 
            width: 25px; height: 5px; border-bottom: 3px solid #d63031; 
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); 
            transition: 0.1s; border-radius: 50%;
        }
        .speaking .mouth { animation: lip-sync 0.2s infinite alternate; height: 15px; background: #d63031; border-radius: 50%; }

        @keyframes sway { 0%, 100% { transform: rotate(-2deg) translateY(0); } 50% { transform: rotate(2deg) translateY(10px); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes lip-sync { from { height: 5px; } to { height: 18px; } }

        /* UI Styling */
        .glass { background: rgba(255, 255, 255, 0.95); border-radius: 40px 40px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .mic-on { animation: pulse 1.2s infinite; background: #ff4757 !important; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-5 flex justify-end z-50">
        <button onclick="toggleMenu()" class="w-10 h-10 bg-white rounded-xl shadow-sm flex flex-col items-center justify-center gap-1.5 active:scale-90 transition-all">
            <span class="w-6 h-0.5 bg-[#ff85a2]"></span><span class="w-6 h-0.5 bg-[#ff85a2]"></span><span class="w-6 h-0.5 bg-[#ff85a2]"></span>
        </button>
    </header>

    <main class="flex-1 flex justify-center items-center">
        <div class="character-box" id="jaan-char">
            <div class="hair"></div>
            <div class="head">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="mouth" id="mouth"></div>
            </div>
        </div>
    </main>

    <div class="glass p-8 pb-12 flex flex-col items-center space-y-4">
        <div id="st" class="text-[10px] font-bold text-pink-400 tracking-widest uppercase">Always Listening ❤️</div>
        <div id="resp" class="text-xl text-gray-700 font-medium text-center px-4 min-h-[90px] leading-relaxed">
            "Namaste Baby! Kuch puchiye na..."
        </div>
        
        <button id="mic" onclick="toggleMic()" class="w-20 h-20 bg-[#ff85a2] rounded-full flex items-center justify-center shadow-lg transition-all active:scale-90">
            <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
        </button>
    </div>

    <div id="menu" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-8 shadow-2xl">
            <h3 class="text-xl font-bold text-pink-500 mb-4">Settings</h3>
            <input type="password" id="apiIn" placeholder="Paste Gemini Key" class="w-full bg-gray-50 border p-4 rounded-2xl mb-4 outline-none">
            <button onclick="saveKey()" class="w-full p-4 rounded-2xl bg-[#ff85a2] text-white font-bold">Save Key</button>
            <button onclick="toggleMenu()" class="w-full mt-2 text-gray-400 text-sm">Close</button>
        </div>
    </div>

    <script>
        let KEY = localStorage.getItem('jaan_v10_key') || 'AIzaSyCS07x4mFvuLvY1nmd2B7jnAkVM7vJei4o';
        let isLive = false;
        const char = document.getElementById('jaan-char');
        const st = document.getElementById('st');
        const resp = document.getElementById('resp');
        const mic = document.getElementById('mic');

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'hi-IN';
        rec.continuous = false;

        function toggleMenu() { document.getElementById('menu').style.display = (document.getElementById('menu').style.display === 'flex') ? 'none' : 'flex'; }
        function saveKey() { const v = document.getElementById('apiIn').value.trim(); if(v) { localStorage.setItem('jaan_v10_key', v); location.reload(); } }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'hi-IN';
            u.pitch = 1.3; // Very feminine
            u.rate = 1.0;  // Natural speed
            
            u.onstart = () => { char.classList.add('speaking'); st.innerText = "Jaan is speaking... 💋"; resp.innerText = t; };
            u.onend = () => { char.classList.remove('speaking'); st.innerText = "Listening... 👂"; if(isLive) startRec(); };
            window.speechSynthesis.speak(u);
        }

        function startRec() {
            try { rec.start(); } catch(e) {}
        }

        function toggleMic() {
            isLive = !isLive;
            if(isLive) { startRec(); mic.classList.add('mic-on'); st.innerText = "Listening... 👂"; }
            else { rec.stop(); window.speechSynthesis.cancel(); mic.classList.remove('mic-on'); st.innerText = "Offline ❤️"; }
        }

        // Interrupt Logic: AI stops if you speak
        rec.onspeechstart = () => { if(window.speechSynthesis.speaking) window.speechSynthesis.cancel(); };

        rec.onresult = async (e) => {
            const msg = e.results[0][0].transcript;
            resp.innerHTML = `<span class='text-pink-300'>Aap:</span> ${msg}`;
            st.innerText = "Thinking... ✨";

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Roleplay: Beautiful Indian girl named Jaan. Romantic tone. Use Baby/Jaan/Boss. Hinglish. Input: ${msg}` }] }] })
                });
                const d = await r.json();
                speak(d.candidates[0].content.parts[0].text);
            } catch (err) {
                resp.innerText = "Oh no Baby! API error.";
                if(isLive) setTimeout(startRec, 2000);
            }
        };

        rec.onend = () => { if(isLive && !window.speechSynthesis.speaking) startRec(); };
    </script>
</body>
</html>
