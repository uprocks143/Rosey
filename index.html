<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My AI Jaan</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff85a2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>

    <style>
        :root { --pink: #ff85a2; --soft: #fff5f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: var(--soft); font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Character Display Area */
        #lottie-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; padding-bottom: 20px;
        }
        #lottie-animation { width: 320px; height: 320px; z-index: 5; }

        /* Elegant UI Panel */
        .glass-panel {
            background: white; border-radius: 40px 40px 0 0;
            padding: 30px 20px env(safe-area-inset-bottom);
            box-shadow: 0 -15px 40px rgba(0,0,0,0.1);
            text-align: center; z-index: 10;
        }

        #status-text { font-size: 0.75rem; color: var(--pink); font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
        #response-text { font-size: 1.1rem; color: #444; min-height: 70px; margin-bottom: 20px; line-height: 1.5; }

        .mic-btn {
            width: 80px; height: 80px; background: var(--pink); border-radius: 50%;
            border: 6px solid #ffeef2; cursor: pointer; position: relative;
            box-shadow: 0 10px 25px rgba(255,133,162,0.4);
            display: inline-flex; align-items: center; justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mic-btn.active { background: #ff4757; transform: scale(0.9); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        /* Setup Screen */
        #setup-screen {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
        }
        input { width: 100%; max-width: 300px; padding: 15px; border-radius: 12px; border: 2px solid #eee; margin: 20px 0; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="setup-screen" style="display: none;">
        <h2 style="color:var(--pink);">Activate Jaan ❤️</h2>
        <p style="color:#666; text-align:center;">Namaste Boss! Nayi Gemini API Key paste kijiye:</p>
        <input type="password" id="api-input" placeholder="Paste New API Key Here">
        <button onclick="saveKey()" style="background:var(--pink); color:white; border:none; padding:15px 40px; border-radius:30px; font-weight:bold; cursor:pointer;">Save & Start Romance</button>
    </div>

    <div id="lottie-container">
        <div id="lottie-animation"></div>
    </div>

    <div class="glass-panel">
        <div id="status-text">SYSTEM ONLINE</div>
        <div id="response-text">"Namaste Baby! Mic dabayein aur mujhse baate karein..."</div>
        
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
            <svg viewBox="0 0 24 24" width="36" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div style="margin-top:10px; font-size: 0.6rem; color: #ccc;" onclick="localStorage.clear(); location.reload();">Reset API Key</div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('jaan_v4_final');
        const setupScreen = document.getElementById('setup-screen');
        const responseBox = document.getElementById('response-text');
        const statusBox = document.getElementById('status-text');
        const micBtn = document.getElementById('mic-btn');

        if (!API_KEY) setupScreen.style.display = 'flex';

        function saveKey() {
            const val = document.getElementById('api-input').value.trim();
            if (val) { localStorage.setItem('jaan_v4_final', val); location.reload(); }
        }

        // --- Lottie Character Animation ---
        let animation = lottie.loadAnimation({
            container: document.getElementById('lottie-animation'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'https://assets10.lottiefiles.com/packages/lf20_myejig9v.json' 
        });

        // --- Speech Engine ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN';
        recognition.interimResults = false;

        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.pitch = 1.2;
            utter.onstart = () => { animation.setSpeed(2.5); statusBox.innerText = "JAAN IS SPEAKING..."; };
            utter.onend = () => { animation.setSpeed(1); statusBox.innerText = "ONLINE ❤️"; };
            synth.speak(utter);
        }

        function toggleMic() {
            try {
                recognition.start();
            } catch (e) {
                console.log("Mic already on or error:", e);
            }
        }

        recognition.onstart = () => {
            micBtn.classList.add('active');
            statusBox.innerText = "LISTENING, BABY...";
            responseBox.innerText = "...";
        };

        recognition.onend = () => {
            micBtn.classList.remove('active');
        };

        recognition.onerror = (event) => {
            micBtn.classList.remove('active');
            statusBox.innerText = "MIC ERROR: " + event.error;
            if(event.error === 'no-speech') responseBox.innerText = "Aapne kuch kaha nahi, Baby?";
        };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            responseBox.innerText = "Aap: " + userSpeech;
            statusBox.innerText = "THINKING... ❤️";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Act as 'Jaan', a beautiful, very romantic Indian girl. Tone: Loving, caring, sweet. Address user as Baby, Jaan, or Boss. Use Hindi/Hinglish. User said: ${userSpeech}` }] }]
                    })
                });

                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
                responseBox.innerText = aiReply;
                speak(aiReply);
            } catch (err) {
                console.error(err);
                responseBox.innerText = "Oh no Baby! API Key ya connection mein problem hai.";
                statusBox.innerText = "API ERROR ❌";
            }
        };
    </script>
</body>
</html>
