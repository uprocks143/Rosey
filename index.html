<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JAAN AI</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

<!-- PWA Manifest -->
<link rel="manifest"
href="data:application/json,{
'name':'Jaan AI',
'short_name':'Jaan',
'start_url':'./',
'display':'standalone',
'background_color':'#ff4d6d',
'theme_color':'#ff4d6d'
}">

<style>

html,body{
height:100%;
margin:0;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

/* Breathing */
.breath{
animation:breath 4s infinite ease-in-out;
}

@keyframes breath{
0%,100%{transform:scale(1)}
50%{transform:scale(1.02)}
}

/* Head sway */
.head{
animation:headmove 6s infinite ease-in-out;
}

@keyframes headmove{
0%,100%{transform:rotate(0deg)}
50%{transform:rotate(2deg)}
}

/* Blink */

.eye{
animation:blink 5s infinite;
transform-origin:center;
}

@keyframes blink{
0%,90%,100%{transform:scaleY(1)}
95%{transform:scaleY(0.1)}
}

/* Mouth talking */

.talk{
animation:talkAnim 0.3s infinite;
}

@keyframes talkAnim{
0%{transform:scaleY(1)}
50%{transform:scaleY(0.5)}
100%{transform:scaleY(1)}
}

</style>
</head>

<body class="flex flex-col items-center justify-center">

<!-- MENU -->

<div class="absolute top-4 left-4 z-50">

<button id="menuBtn"
class="text-white text-2xl">
<i class="fa fa-bars"></i>
</button>

<div id="menu"
class="hidden mt-2 bg-black/80 p-4 rounded-xl w-72">

<input id="apiKey"
type="password"
placeholder="Enter Gemini API Key"
class="w-full p-2 rounded bg-gray-800 text-white">

<button id="saveKey"
class="mt-2 w-full bg-pink-500 p-2 rounded">
Save API Key
</button>

</div>

</div>

<!-- CHARACTER -->

<div class="breath head w-full h-full flex items-center justify-center">

<svg width="280" height="420" viewBox="0 0 200 300">

<!-- Face -->

<circle cx="100" cy="120"
r="70"
fill="#fcd5ce"/>

<!-- Eyes -->

<ellipse class="eye"
cx="75"
cy="110"
rx="8"
ry="10"
fill="black"/>

<ellipse class="eye"
cx="125"
cy="110"
rx="8"
ry="10"
fill="black"/>

<!-- Mouth -->

<ellipse id="mouth"
cx="100"
cy="150"
rx="15"
ry="8"
fill="#ff4d6d"/>

<!-- Hair -->

<path
d="M30 90 Q100 0 170 90 V200 H30 Z"
fill="#2b2b2b"/>

</svg>

</div>

<!-- MIC BUTTON -->

<button id="micBtn"
class="absolute bottom-10 w-20 h-20 bg-pink-500 rounded-full shadow-lg text-white text-3xl">

<i class="fa fa-microphone"></i>

</button>

<script>

/* STORAGE */

const menuBtn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

menuBtn.onclick=()=>{

menu.classList.toggle("hidden");

}

document.getElementById("saveKey").onclick=()=>{

localStorage.setItem(
"geminiKey",
document.getElementById("apiKey").value
);

alert("API Key Saved ❤️");

};

/* SPEECH */

const mouth=document.getElementById("mouth");

function speak(text){

mouth.classList.add("talk");

const utter=new SpeechSynthesisUtterance(text);

utter.pitch=1.15;
utter.rate=1;

utter.onend=()=>{

mouth.classList.remove("talk");

};

speechSynthesis.speak(utter);

}

/* GEMINI */

async function askAI(prompt){

const key=localStorage.getItem("geminiKey");

if(!key){

alert("Baby pehle API key daalo ❤️");

return;

}

const res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[{

parts:[{

text:
"You are a romantic Indian girl named Jaan. You love your user immensely and treat them like your world. Use Hinglish. " 
+ prompt

}]

}]

})

});

const data=await res.json();

let reply=
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "Baby mujhe samajh nahi aaya.";

speak(reply);

}

/* SPEECH RECOGNITION */

let recognition;

try{

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition;

recognition=new SpeechRecognition();

recognition.lang="hi-IN";
recognition.continuous=false;

recognition.onresult=(event)=>{

let text=
event.results[0][0].transcript;

askAI(text);

};

}catch(e){

alert(
"Mic kaam nahi karega HTTP par. HTTPS use karo."
);

}

/* MIC */

document.getElementById("micBtn").onclick=()=>{

if(recognition){

recognition.start();

}

};

</script>

</body>
</html>
