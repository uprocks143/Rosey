<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Jaan - My Love</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff85a2">
    
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        :root { --pink: #ff85a2; --soft: #fff5f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: var(--soft); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Character Container - Open Source Animation */
        .character-stage {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; padding-top: 40px;
        }

        lottie-player {
            width: 320px; height: 320px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        /* UI Panel (Mobile App Feel) */
        .ui-panel {
            background: white; border-radius: 40px 40px 0 0;
            padding: 30px 20px env(safe-area-inset-bottom);
            box-shadow: 0 -15px 40px rgba(0,0,0,0.08);
            text-align: center; z-index: 100;
        }

        #status-pill {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            background: #ffe0e9; color: var(--pink); font-size: 0.75rem;
            font-weight: bold; margin-bottom: 10px; text-transform: uppercase;
        }

        #response-text {
            font-size: 1.15rem; color: #333; min-height: 80px;
            margin: 10px 0 25px; line-height: 1.5; font-weight: 500;
        }

        .mic-btn {
            width: 85px; height: 85px; background: var(--pink);
            border-radius: 50%; border: 8px solid #ffe0e9; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(255,133,162,0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mic-btn:active { transform: scale(0.9); border-width: 4px; }
        .mic-btn.listening { background: #e74c3c; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* API Key Setup Screen */
        #api-screen {
            position: fixed; inset: 0; background: white; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
        }
        input {
            width: 100%; max-width: 300px; padding: 18px; border-radius: 15px;
            border: 2px solid #eee; background: #f9f9f9; font-size: 1rem; margin: 20px 0;
        }
    </style>
</head>
<body>

    <div id="api-screen" style="display: none;">
        <h2 style="color:var(--pink);">Activate Your Jaan ❤️</h2>
        <p style="text-align:center; color:#666;">Namaste Boss! Gemini API Key daaliye taaki hum baate kar sakein.</p>
        <input type="password" id="api-input" placeholder="Paste Gemini Key Here...">
        <button onclick="saveKey()" style="background:var(--pink); color:white; border:none; padding:15px 45px; border-radius:30px; font-weight:bold; cursor:pointer;">Start Romance</button>
    </div>

    <div class="character-stage">
        <lottie-player id="lottie-character" 
            src="https://assets10.lottiefiles.com/packages/lf20_myejig9v.json" 
            background="transparent" speed="1" loop autoplay>
        </lottie-player>
    </div>

    <div class="ui-panel">
        <div id="status-pill">System Ready</div>
        <div id="response-text">"Namaste Baby! Tap kijiye aur mujhse dil ki baat kijiye..."</div>
        
        <button class="mic-btn" id="mic-btn" onclick="startMic()">
            <svg viewBox="0 0 24 24" width="38" height="38" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div style="margin-top:15px; font-size: 0.7rem; color: #bbb;">Vercel/HTTPS required for Mic Access</div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('jaan_api_secure');
        const apiScreen = document.getElementById('api-screen');
        const responseText = document.getElementById('response-text');
        const statusPill = document.getElementById('status-pill');
        const micBtn = document.getElementById('mic-btn');
        const character = document.getElementById('lottie-character');

        if (!API_KEY) apiScreen.style.display = 'flex';

        function saveKey() {
            const val = document.getElementById('api-input').value.trim();
            if (val) { localStorage.setItem('jaan_api_secure', val); location.reload(); }
        }

        // --- Speech Logic ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        const synth = window.speechSynthesis;

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.pitch = 1.2; // Feminine pitch
            
            utter.onstart = () => {
                character.speed = 2.5; // Fast motion while talking
                statusPill.innerText = "Speaking... 💋";
            };
            utter.onend = () => {
                character.speed = 1; // Normal motion
                statusPill.innerText = "Online ❤️";
                micBtn.classList.remove('listening');
            };
            synth.speak(utter);
        }

        async function startMic() {
            try {
                recognition.start();
                micBtn.classList.add('listening');
                statusPill.innerText = "Listening... 👂";
            } catch (e) {
                alert("Microphone Error! Please use HTTPS link.");
            }
        }

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            responseText.innerText = "Aap: " + userSpeech;
            statusPill.innerText = "Thinking... 🤔";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `System: You are a sweet Indian girl AI named 'Jaan'. Tone: Extremely romantic, caring, flirty. Use Hindi/Hinglish. Call the user 'Baby' or 'Jaan' or 'Boss'. User said: ${userSpeech}` }] }]
                    })
                });

                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                responseText.innerText = reply;
                speak(reply);
            } catch (err) {
                responseText.innerText = "Oh no Baby! API Key check kijiye na, connection nahi ho raha.";
                micBtn.classList.remove('listening');
            }
        };

        recognition.onerror = () => {
            statusPill.innerText = "Mic Denied ❌";
            micBtn.classList.remove('listening');
        };
    </script>
</body>
</html>
