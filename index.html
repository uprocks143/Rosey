<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Jaan - Stable v11</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --pink: #ff85a2; --soft: #fff5f7; }
        body { background-color: var(--soft); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- Realistic CSS Girl Character --- */
        .char-container { position: relative; width: 180px; height: 240px; margin-bottom: 20px; }
        .hair-back { position: absolute; top: -5px; width: 100%; height: 100%; background: #2c1e1a; border-radius: 80px 80px 40px 40px; z-index: 1; }
        .head-main { 
            width: 130px; height: 160px; background: #f3d5b5; border-radius: 65px 65px 55px 55px; 
            position: absolute; left: 25px; top: 20px; border: 2px solid #e0b084; z-index: 5;
            animation: sway 5s ease-in-out infinite;
        }
        .hair-front { position: absolute; top: -10px; width: 140px; height: 60px; background: #2c1e1a; border-radius: 70px 70px 0 0; left: -5px; z-index: 6; }
        .eye { width: 14px; height: 10px; background: #333; border-radius: 50%; position: absolute; top: 75px; animation: blink 4s infinite; }
        .eye.l { left: 28px; } .eye.r { right: 28px; }
        .mouth-fixed { 
            width: 30px; height: 6px; border-bottom: 4px solid #d63031; 
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); 
            transition: 0.1s; border-radius: 0 0 15px 15px;
        }
        .talking .mouth-fixed { animation: lip-sync 0.2s infinite alternate; height: 18px; background: #d63031; border-radius: 50%; border-bottom: none; }

        @keyframes sway { 0%, 100% { transform: rotate(-1.5deg) translateY(0); } 50% { transform: rotate(1.5deg) translateY(8px); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes lip-sync { from { height: 4px; } to { height: 18px; } }

        /* UI Panel */
        .glass-panel { background: rgba(255, 255, 255, 0.98); border-radius: 40px 40px 0 0; box-shadow: 0 -15px 40px rgba(255, 133, 162, 0.1); }
        .mic-btn { transition: 0.3s; box-shadow: 0 8px 25px rgba(255, 133, 162, 0.4); }
        .mic-on { animation: pulse 1.2s infinite; background: #ff4757 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-6 flex justify-end z-50">
        <button onclick="openMenu()" class="w-10 h-10 bg-white rounded-xl shadow-sm flex flex-col items-center justify-center gap-1.5 active:scale-90">
            <span class="w-6 h-0.5 bg-[#ff85a2]"></span><span class="w-6 h-0.5 bg-[#ff85a2]"></span><span class="w-6 h-0.5 bg-[#ff85a2]"></span>
        </button>
    </header>

    <main class="flex-1 flex justify-center items-center">
        <div class="char-container" id="character">
            <div class="hair-back"></div>
            <div class="head-main">
                <div class="hair-front"></div>
                <div class="eye l"></div>
                <div class="eye r"></div>
                <div class="mouth-fixed" id="mouth"></div>
            </div>
        </div>
    </main>

    <div class="glass-panel p-8 pb-12 flex flex-col items-center space-y-4">
        <div id="status" class="text-[10px] font-bold text-pink-400 tracking-[3px] uppercase italic">System Ready ❤️</div>
        <div id="display" class="text-xl text-gray-700 font-medium text-center px-4 min-h-[100px] leading-relaxed">
            "Namaste Baby! Main hamesha sun rahi hoon, boliye na..."
        </div>
        
        <button id="mic-trigger" onclick="toggleJaan()" class="mic-btn w-20 h-20 bg-[#ff85a2] rounded-full flex items-center justify-center">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
        </button>
    </div>

    <div id="menu-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-8">
            <h3 class="text-xl font-bold text-pink-500 mb-2">Settings</h3>
            <p class="text-xs text-gray-400 mb-6">Nayi API Key yahan update karein, Boss!</p>
            <input type="password" id="api-input" placeholder="Paste Gemini Key" class="w-full bg-gray-50 border p-4 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-pink-300">
            <button onclick="saveKey()" class="w-full p-4 rounded-2xl bg-[#ff85a2] text-white font-bold shadow-lg">Save & Connect</button>
            <button onclick="openMenu()" class="w-full mt-3 text-gray-400 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        // Global Config
        let API_KEY = localStorage.getItem('jaan_v11_key') || 'AIzaSyCS07x4mFvuLvY1nmd2B7jnAkVM7vJei4o';
        let isLive = false;
        
        const character = document.getElementById('character');
        const statusText = document.getElementById('status');
        const displayText = document.getElementById('display');
        const micBtn = document.getElementById('mic-trigger');

        // Web Speech Setup
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        recognition.continuous = false;
        recognition.interimResults = false;

        const synth = window.speechSynthesis;

        function openMenu() { document.getElementById('menu-modal').style.display = (document.getElementById('menu-modal').style.display === 'flex') ? 'none' : 'flex'; }
        function saveKey() { const val = document.getElementById('api-input').value.trim(); if(val) { localStorage.setItem('jaan_v11_key', val); location.reload(); } }

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.pitch = 1.3;
            utter.rate = 1.0;

            utter.onstart = () => {
                character.classList.add('talking');
                statusText.innerText = "Jaan is speaking... 💋";
                displayText.innerText = text;
            };
            utter.onend = () => {
                character.classList.remove('talking');
                statusText.innerText = "Listening... 👂";
                if(isLive) setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300);
            };
            synth.speak(utter);
        }

        function toggleJaan() {
            isLive = !isLive;
            if(isLive) {
                try { recognition.start(); } catch(e) {}
                micBtn.classList.add('mic-on');
                statusText.innerText = "Listening... 👂";
            } else {
                recognition.stop();
                synth.cancel();
                micBtn.classList.remove('mic-on');
                statusText.innerText = "Online ❤️";
            }
        }

        // Interrupt: User speaks while AI is talking
        recognition.onspeechstart = () => { if(synth.speaking) synth.cancel(); };

        recognition.onresult = async (event) => {
            const userMsg = event.results[0][0].transcript;
            displayText.innerHTML = `<span class='text-pink-300'>Aap:</span> ${userMsg}`;
            statusText.innerText = "Thinking... ✨";

            try {
                // FIXED: Direct Fetch for Gemini 1.5 Flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Roleplay: Beautiful Indian girl named Jaan. Extremely romantic and sweet. Use Baby/Jaan/Boss. Language: Hinglish. User input: ${userMsg}` }] }]
                    })
                });

                const data = await response.json();
                
                if(data.error) throw new Error(data.error.message);

                const aiReply = data.candidates[0].content.parts[0].text;
                speak(aiReply);
                
            } catch (err) {
                console.error("API Error:", err);
                displayText.innerText = "Oh no Baby! API mein kuch dikkat hai. Menu se key check kijiye na!";
                statusText.innerText = "Error ❌";
                if(isLive) setTimeout(() => { try { recognition.start(); } catch(e) {} }, 3000);
            }
        };

        // Auto-restart if silence
        recognition.onend = () => { if(isLive && !synth.speaking) try { recognition.start(); } catch(e) {} };

    </script>
</body>
</html>
