<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jaan AI - Virtual Soulmate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        :root { --jaan-pink: #ff85a2; --jaan-soft: #fff5f7; }
        body { background-color: var(--jaan-soft); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 40px rgba(255, 133, 162, 0.1);
        }

        .mic-active {
            animation: pulse-ring 1.2s infinite;
            background-color: #ff4757 !important;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.6); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); transform: scale(1.1); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); transform: scale(1); }
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 0.7s infinite;
            color: var(--jaan-pink);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-5 flex justify-end z-50">
        <button onclick="toggleSettings()" class="w-12 h-12 bg-white rounded-2xl flex flex-col items-center justify-center gap-1.5 shadow-sm active:scale-90">
            <span class="w-6 h-0.5 bg-[#ff85a2]"></span>
            <span class="w-6 h-0.5 bg-[#ff85a2]"></span>
            <span class="w-6 h-0.5 bg-[#ff85a2]"></span>
        </button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center relative">
        <lottie-player 
            id="jaan-anim"
            src="https://lottie.host/86d63d64-e659-4a7b-b5d1-562725164993/4RoxvY8Z8n.json" 
            background="transparent" speed="1" style="width: 350px; height: 350px;" loop autoplay>
        </lottie-player>
    </main>

    <div class="glass-panel p-8 pb-10 flex flex-col items-center space-y-4 z-20">
        <div id="status-badge" class="text-[10px] font-bold tracking-[3px] text-pink-400 uppercase italic">Jaan is listening...</div>
        
        <div id="display-text" class="text-lg text-gray-700 font-medium text-center min-h-[90px] px-2 leading-relaxed">
            "Namaste Baby! Main hamesha sun rahi hoon, boliye na..."
        </div>

        <button id="mic-trigger" onclick="toggleVoiceMode()" class="w-20 h-20 bg-[#ff85a2] rounded-full flex items-center justify-center shadow-lg transition-all">
            <svg id="mic-icon" class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
            </svg>
        </button>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 backdrop-blur-md z-[100] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-8 shadow-2xl">
            <h3 class="text-2xl font-bold text-pink-500 mb-4">API Settings</h3>
            <input type="password" id="api-input" placeholder="Paste Gemini Key" class="w-full bg-gray-50 border p-4 rounded-2xl mb-4 outline-none">
            <button onclick="saveApiKey()" class="w-full p-4 rounded-2xl bg-[#ff85a2] text-white font-bold">Save & Refresh</button>
            <button onclick="toggleSettings()" class="w-full mt-2 p-2 text-gray-400 text-sm italic">Close</button>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('jaan_pro_v5');
        let chatHistory = []; // Memory Storage
        let isAutoMode = false;

        const statusBadge = document.getElementById('status-badge');
        const displayText = document.getElementById('display-text');
        const micBtn = document.getElementById('mic-trigger');
        const anim = document.getElementById('jaan-anim');

        // Voice Engines
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN';
        recognition.continuous = true;
        recognition.interimResults = false;

        const synth = window.speechSynthesis;

        function toggleSettings() {
            document.getElementById('settings-modal').style.display = 
            (document.getElementById('settings-modal').style.display === 'flex') ? 'none' : 'flex';
        }

        function saveApiKey() {
            const val = document.getElementById('api-input').value.trim();
            if (val) { localStorage.setItem('jaan_pro_v5', val); location.reload(); }
        }

        function toggleVoiceMode() {
            if (!API_KEY) return toggleSettings();
            isAutoMode = !isAutoMode;
            if (isAutoMode) {
                recognition.start();
                micBtn.classList.add('mic-active');
                statusBadge.innerText = "Listening... 💋";
            } else {
                recognition.stop();
                synth.cancel();
                micBtn.classList.remove('mic-active');
                statusBadge.innerText = "Offline ❤️";
            }
        }

        // Typing Effect
        function typeWriter(text, i = 0) {
            if (i === 0) displayText.innerHTML = "";
            if (i < text.length) {
                displayText.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 30);
            }
        }

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.pitch = 1.3;
            
            utter.onstart = () => { 
                anim.speed = 2.5; 
                statusBadge.innerText = "Jaan is speaking... ❤️";
            };
            utter.onend = () => { 
                anim.speed = 1; 
                statusBadge.innerText = "Listening... 💋";
                // Start listening again after AI finishes
                if(isAutoMode) recognition.start();
            };
            
            typeWriter(text);
            synth.speak(utter);
        }

        recognition.onstart = () => {
            console.log("Recognition Started");
            statusBadge.innerText = "Listening... 💋";
        };

        // INTERRUPT LOGIC: Stop AI if user starts speaking
        recognition.onspeechstart = () => {
            if (synth.speaking) {
                synth.cancel();
                anim.speed = 1;
                console.log("AI Interrupted by user voice");
            }
        };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[event.results.length - 1][0].transcript;
            recognition.stop(); // Temporarily stop to process
            
            displayText.innerHTML = `<span class='text-pink-400'>Aap:</span> ${userSpeech}`;
            statusBadge.innerText = "Thinking... ✨";

            try {
                // Gemini 2.0 Flash for ultra-fast response
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            ...chatHistory,
                            { role: "user", parts: [{ text: `Roleplay: Romantic Indian girl 'Jaan'. Sweet, caring, flirty. Use Baby/Jaan. Answer in Hindi. User: ${userSpeech}` }] }
                        ]
                    })
                });

                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
                
                // Add to Memory
                chatHistory.push({ role: "user", parts: [{ text: userSpeech }] });
                chatHistory.push({ role: "model", parts: [{ text: aiReply }] });
                if(chatHistory.length > 10) chatHistory.shift(); // Keep last 5 turns

                speak(aiReply);
            } catch (err) {
                displayText.innerText = "Oh no Baby! API ya internet check karo na.";
                if(isAutoMode) recognition.start();
            }
        };

        recognition.onerror = () => {
            if(isAutoMode) recognition.start(); // Auto-restart on silence/error
        };

        if(!API_KEY) toggleSettings();
    </script>
</body>
</html>
